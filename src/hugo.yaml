baseURL: "https://garcia.in"
languageCode: "en-us"
title: "Bruno Garcia's blog"
paginate: 5
theme: hugo-PaperMod

enableEmoji: true
enableInlineShortcodes: true
enableRobotsTXT: true

languages:
  en:
    languageName: "English"
    weight: 1

outputFormats:
  llms:
    mediaType: "text/plain"
    baseName: "llms"
    isPlainText: true

outputs:
  home:
    - HTML
    - RSS
    - llms

markup:
  highlight:
    style: dracula
    lineNos: false
    guessSyntax: true

minify:
  disableXML: true
  minifyOutput: true

params:
  env: production
  description: "Bruno Garcia — Software Engineer. Blog about software development, NuGet Trends, and Code Review Trends."
  author: Bruno Garcia
  ShowReadingTime: true
  defaultTheme: auto
  ShowShareButtons: false
  schema:
    publisherType: "Person"

  displayFullLangName: true
  images:
    - "https://brunogarcia.com/assets/img/cover.jpg"
  cover:
    responsiveImages: true
  homeInfoParams:
    Title: Bruno Garcia's Blog
    Content: >-
      The rants and chants of a Software Developer.
      Check out [Code Review Trends](https://codereviewtrends.com) and [NuGet Trends](https://nugettrends.com).
  socialIcons:
    - name: "bluesky"
      url: "https://bsky.app/profile/brunogarcia.com"
    - name: "twitter"
      url: "https://twitter.com/brungarc"
    - name: "github"
      title: "GitHub"
      url: "https://github.com/bruno-garcia"
    - name: "stackoverflow"
      title: "StackOverflow"
      url: "https://stackoverflow.com/users/1977143/bruno-garcia"
    - name: "nuget"
      url: "https://www.nuget.org/profiles/bruno-garcia"
    - name: "reddit"
      url: "https://www.reddit.com/user/bruno-garcia"
    - name: "rss"
      url: "/index.xml"

taxonomies:
  category: categories
  tag: tags
  series: series

privacy:
  disqus:
    disable: true
  googleAnalytics:
    disable: true
  instagram:
    disable: true
  x:
    disable: true
  vimeo:
    disable: true
  youtube:
    disable: true
